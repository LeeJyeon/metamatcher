name: Python Hello World

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python script
        env:
          DETEKT_REPORT_SLACK_WEBHOOK_URL: ${{ secrets.DETEKT_REPORT_SLACK_WEBHOOK_URL }}
        run: python scripts/hello.py
